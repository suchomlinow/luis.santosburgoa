name: Deploy Zola Site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "gh-pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zola
        run: |
          set -euxo pipefail
          ZOLA_VERSION="0.20.0"
          curl -sL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o zola.tar.gz
          tar -xzf zola.tar.gz
          sudo mv zola /usr/local/bin/zola
          zola --version

      - name: Build site
        run: |
          set -euxo pipefail
          zola build --config zola.toml --base-url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
        working-directory: ./luis.santosburgoa-site

      - name: Deploy to gh-pages
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euxo pipefail
          REPO_URL="https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}.git"
          TARGET_DIR="/tmp/gh-pages-${{ github.run_id }}"

          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"

          if git ls-remote --exit-code --heads "${REPO_URL}" gh-pages; then
            git clone --depth 1 --branch gh-pages "${REPO_URL}" "${TARGET_DIR}"
          else
            git clone --depth 1 "${REPO_URL}" "${TARGET_DIR}"
            cd "${TARGET_DIR}"
            git checkout --orphan gh-pages
            git rm -rf . || true
            cd -
          fi

          rsync -av --delete ./luis.santosburgoa-site/public/ "${TARGET_DIR}/"
          touch "${TARGET_DIR}/.nojekyll"

          cd "${TARGET_DIR}"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes to deploy."
            exit 0
          fi
          git commit -m "Deploy site from ${GITHUB_SHA}"
          git push origin gh-pages
