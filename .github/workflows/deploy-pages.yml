name: Deploy Zola Site to GitHub Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "gh-pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Zola
        run: |
          set -euxo pipefail
          ZOLA_VERSION="0.20.0"
          curl -sL "https://github.com/getzola/zola/releases/download/v${ZOLA_VERSION}/zola-v${ZOLA_VERSION}-x86_64-unknown-linux-gnu.tar.gz" -o zola.tar.gz
          tar -xzf zola.tar.gz
          sudo mv zola /usr/local/bin/zola
          zola --version

      - name: Build site
        run: |
          set -euxo pipefail
          zola build --base-url "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}"
        working-directory: ./luis.santosburgoa-site

      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./luis.santosburgoa-site/public
          publish_branch: gh-pages
          force_orphan: true
